<!DOCTYPE html>
<html lang="ky">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Ногой санжырасы</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&family=PT+Sans:ital,wght@0,400;0,700;1,400;1,700&display=swap">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app" id="app">
  <div class="viewport" id="viewport">
    <div class="world" id="world">
      <svg class="links" id="links"></svg>
      <div class="gens" id="gens"></div>
      <div class="knotlayer" id="knotlayer"></div>
      <div class="nodes" id="nodes"></div>
    </div>
    <svg class="flourish l" viewBox="0 0 190 150" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M14 148 C14 96 46 96 46 118 C46 132 30 132 30 120 M60 148 C60 70 108 70 108 106 C108 128 82 128 82 110 C82 98 96 98 96 106 M120 148 C120 44 186 44 186 96"/>
    </svg>
    <svg class="flourish r" viewBox="0 0 190 150" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M14 148 C14 96 46 96 46 118 C46 132 30 132 30 120 M60 148 C60 70 108 70 108 106 C108 128 82 128 82 110 C82 98 96 98 96 106 M120 148 C120 44 186 44 186 96"/>
    </svg>
    <div class="legend">
      <div data-i18n-html="legend1"><b>Кутуча</b> — бир адам · <b class="lg">Кызыл</b> — түз ата-тек · <b class="lg">◈</b> — уруу башчысы · <b class="lg">⌂</b> — уруунун аты</div>
      <div data-i18n-html="legend2">Түйүндүн астындагы <b class="lg">＋ / －</b> — бутакты ачуу/жашыруу · сүйрөп жылдырыңыз · дөңгөлөк менен чоңойтуңуз · басып тааныңыз</div>
    </div>
  </div>

  <header class="bar" id="bar">
    <div class="brand">
      <svg class="horn" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round">
        <path d="M20 40 C20 20 6 20 6 30 C6 38 16 38 16 30 C16 25 11 25 11 29"/>
        <path d="M28 40 C28 20 42 20 42 30 C42 38 32 38 32 30 C32 25 37 25 37 29"/>
        <path d="M24 40 L24 10 M24 10 C21 13 21 17 24 19 C27 17 27 13 24 10"/>
      </svg>
      <div>
        <div class="bt">НОГОЙ САНЖЫРАСЫ</div>
        <div class="bs" data-i18n="brandSubtitle">Эркек тукум боюнча ата-теги</div>
      </div>
    </div>
    <div class="spring"></div>
    <div class="searchwrap">
      <svg class="si" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M20 20 L16 16"/></svg>
      <input class="search" id="search" type="text" placeholder="Ат боюнча издөө" aria-label="Ат боюнча издөө" data-i18n-placeholder="searchPlaceholder" data-i18n-aria="searchPlaceholder">
      <span class="mcount" id="mcount"></span>
    </div>
    <button class="ancbtn" id="ancbtn" data-action="anc">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 4 L12 20 M12 4 L7 9 M12 4 L17 9"/></svg>
      <span data-anclabel>Ата-бабаларды ачуу</span>
    </button>
    <div class="langsel-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.7 2.6 4 5.7 4 9s-1.3 6.4-4 9c-2.7-2.6-4-5.7-4-9s1.3-6.4 4-9z"/></svg>
      <select class="langsel" id="langSelect" data-i18n-aria="langLabel" aria-label="Тил тандоо">
        <option value="ky">Кыргызча</option>
        <option value="ru">Русский</option>
        <option value="en">English</option>
      </select>
    </div>
    <div class="zoom">
      <button class="zbtn" data-action="zin" aria-label="Чоңойтуу" data-i18n-aria="zoomIn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 6v12M6 12h12"/></svg></button>
      <button class="zbtn" data-action="zout" aria-label="Кичирейтүү" data-i18n-aria="zoomOut"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 12h12"/></svg></button>
      <button class="zbtn" data-action="home" aria-label="Башкы көрүнүш" data-i18n-aria="home"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round"><path d="M4 12 L12 4 L20 12"/><path d="M6 11 L6 20 L18 20 L18 11"/></svg></button>
      <button class="zbtn" data-action="fit" aria-label="Бүт дарак" data-i18n-aria="fit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/></svg></button>
    </div>
  </header>

  <div class="scrim" id="scrim" data-action="close"></div>
  <aside class="panel" id="panel">
    <div class="grip"></div>
    <div class="pclose" id="pclose" data-action="close" role="button" aria-label="Жабуу" data-i18n-aria="close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6 L18 18 M18 6 L6 18"/></svg>
    </div>
    <div class="pscroll" id="pbody"></div>
  </aside>
</div>

<script src="data.js"></script>
<script src="i18n.js"></script>
<script src="app.js"></script>
</body>
</html>
